name: Release

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: shapeshifter-linux-x86_64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: shapeshifter-windows-x86_64

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libxcb-render0-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-dev \
            libwayland-dev \
            libgl1-mesa-dev \
            libfontconfig1-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxi-dev

      - name: Build release binary
        run: cargo build --release --package shapeshifter-desktop --target ${{ matrix.target }}

      - name: Package (Linux)
        if: runner.os == 'Linux'
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shapeshifter-desktop dist/${{ matrix.artifact }}
          chmod +x dist/${{ matrix.artifact }}

      - name: Package (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          mkdir -p dist
          cp target/${{ matrix.target }}/release/shapeshifter-desktop.exe dist/${{ matrix.artifact }}.exe

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: dist/*

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate tag
        id: tag
        run: echo "tag=v0.1.0-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: Shapeshifter ${{ steps.tag.outputs.tag }}
          generate_release_notes: true
          files: artifacts/*
